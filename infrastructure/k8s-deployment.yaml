  namespace: aiggs
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: mcp-gateway-service

  template:
    metadata:
      labels:
        app: mcp-gateway-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"

    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - mcp-gateway-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: mcp-gateway
          image: aiggs/mcp-gateway-service:1.0.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8083
            - name: metrics
              containerPort: 9090

          env:
            - name: SERVICE_NAME
              value: mcp-gateway-service
            - name: REDIS_HOST
              value: redis.aiggs.svc.cluster.local
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiggs-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_HOST
              value: rabbitmq.aiggs.svc.cluster.local
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiggs-secrets
                  key: RABBITMQ_PASSWORD
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiggs-secrets
                  key: CLAUDE_API_KEY
            - name: GPT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiggs-secrets
                  key: GPT_API_KEY
            - name: MCP_REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: game-config
                  key: MCP_REQUEST_TIMEOUT
            - name: MCP_MAX_CONCURRENT_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: game-config
                  key: MCP_MAX_CONCURRENT_REQUESTS

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi

          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command:
                  - sleep
                  - "30"

      terminationGracePeriodSeconds: 40

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway-service
  namespace: aiggs
spec:
  type: ClusterIP
  selector:
    app: mcp-gateway-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083

---
# ============================================================================
# Notification Service - 通知服务（含 WebSocket）
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: aiggs
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: notification-service

  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"

    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - notification-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: notification
          image: aiggs/notification-service:1.0.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8084
            - name: websocket
              containerPort: 8085
            - name: metrics
              containerPort: 9090

          env:
            - name: SERVICE_NAME
              value: notification-service
            - name: REDIS_HOST
              value: redis.aiggs.svc.cluster.local
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiggs-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_HOST
              value: rabbitmq.aiggs.svc.cluster.local
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiggs-secrets
                  key: RABBITMQ_PASSWORD

          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi

          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command:
                  - sleep
                  - "30"

      terminationGracePeriodSeconds: 40

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: aiggs
spec:
  type: ClusterIP
  selector:
    app: notification-service
  # 使用 sessionAffinity 实现 WebSocket sticky session
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
  ports:
    - name: http
      port: 8084
      targetPort: 8084
    - name: websocket
      port: 8085
      targetPort: 8085

---
# ============================================================================
# Nginx Ingress Controller
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ingress-controller
  namespace: aiggs
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-ingress
  template:
    metadata:
      labels:
        app: nginx-ingress
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nginx-ingress
                topologyKey: kubernetes.io/hostname

      serviceAccountName: nginx-ingress

      containers:
        - name: nginx-ingress-controller
          image: nginx/nginx-ingress:3.0.2
          imagePullPolicy: IfNotPresent

          args:
            - -nginx-configmaps=$(POD_NAMESPACE)/nginx-config
            - -ingress-class=nginx

          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
            - name: metrics
              containerPort: 9113

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          readinessProbe:
            httpGet:
              path: /nginx_status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /nginx_status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-controller
  namespace: aiggs
spec:
  type: LoadBalancer
  selector:
    app: nginx-ingress
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-ingress
  namespace: aiggs

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nginx-ingress
rules:
  - apiGroups: [""]
    resources: ["configmaps", "namespaces", "secrets", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nginx-ingress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nginx-ingress
subjects:
  - kind: ServiceAccount
    name: nginx-ingress
    namespace: aiggs

---
# ============================================================================
# Ingress - 路由配置
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiggs-ingress
  namespace: aiggs
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
spec:
  ingressClassName: nginx
  rules:
    - host: api.aiggs.xyz
      http:
        paths:
          - path: /game
            pathType: Prefix
            backend:
              service:
                name: game-core-service
                port:
                  number: 8080
          - path: /steal
            pathType: Prefix
            backend:
              service:
                name: steal-service
                port:
                  number: 8081
          - path: /exchange
            pathType: Prefix
            backend:
              service:
                name: exchange-service
                port:
                  number: 8082
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: mcp-gateway-service
                port:
                  number: 8083
          - path: /notify
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8084
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8085

---
# ============================================================================
# 存储类 - 高性能 SSD
# ============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
provisioner: kubernetes.io/aws-ebs
allowVolumeExpansion: true
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
